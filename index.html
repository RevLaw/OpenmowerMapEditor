<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMower Map Editor</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <div class="panel-header">
          <h1>OpenMower Map Editor</h1>
          <button id="themeToggle" class="theme-toggle" type="button" title="Toggle light/dark mode">
            ☀️
          </button>
        </div>
        <p class="panel-subtitle">Fast map edits with tool-based controls.</p>

        <section class="panel-card">
          <h2>Map Source</h2>
          <label class="file-input">
            <span>Open local map JSON</span>
            <input id="jsonFile" type="file" accept=".json,application/json" />
          </label>
          <label>
            Load running map or backup
            <select id="backupSelect">
              <option value="">No map files found</option>
            </select>
          </label>
          <label>
            Area type / area
            <select id="areaSelect"></select>
          </label>
          <label>
            New zone type
            <select id="zoneTypeSelect">
              <option value="mow">mow</option>
              <option value="obstacle">obstacle</option>
              <option value="nav">nav</option>
            </select>
          </label>
          <div class="undo-redo-row">
            <button id="addZone" type="button" title="Add new zone">Add zone</button>
            <button id="removeZone" type="button" title="Remove selected zone">Remove zone</button>
          </div>
        </section>

        <section class="panel-card geo-box">
          <h2>Projection</h2>
          <p class="hint">
            Use coordinates from <code>openmower config ros</code>:
            <code>datum_lat</code> and <code>datum_long</code>.
          </p>
          <label>
            Origin latitude
            <input id="originLat" type="number" step="0.000001" value="52.52" />
          </label>
          <label>
            Origin longitude
            <input id="originLng" type="number" step="0.000001" value="13.405" />
          </label>
          <button id="applyProjection" type="button">Apply projection</button>
        </section>

        <section class="panel-card controls">
          <h2>Edit Tools</h2>
          <p class="controls-hint">Hover a tool for details.</p>
          <div class="undo-redo-row">
            <button id="undoEdit" class="tool-btn" type="button" title="Undo last edit action">
              ↶
            </button>
            <button id="redoEdit" class="tool-btn" type="button" title="Redo last undone action">
              ↷
            </button>
          </div>
          <div class="tool-row">
            <button
              id="toggleMultiSelect"
              class="tool-btn"
              type="button"
              title="Multi-select tool"
              aria-label="Multi-select tool"
            >
              ◫
            </button>
            <button
              id="toggleAdd"
              class="tool-btn"
              type="button"
              title="Add point tool"
              aria-label="Add point tool"
            >
              ＋
            </button>
            <button
              id="toggleBrush"
              class="tool-btn"
              type="button"
              title="Push brush tool"
              aria-label="Push brush tool"
            >
              ◯
            </button>
            <button
              id="toggleSnap"
              class="tool-btn"
              type="button"
              title="Snap line tool"
              aria-label="Snap line tool"
            >
              ╱
            </button>
            <button
              id="cleanupPoints"
              class="tool-btn"
              type="button"
              title="Cleanup tool"
              aria-label="Cleanup close points"
            >
              🧹
            </button>
            <button
              id="removePoint"
              class="tool-btn tool-btn-danger"
              type="button"
              title="Remove selected point"
              aria-label="Remove selected point"
            >
              ✕
            </button>
          </div>

          <div id="brushControls" class="tool-settings">
            <label class="slider-field" for="brushRadius">
              <span>Brush radius (m)</span>
              <span id="brushRadiusValue">0.35</span>
            </label>
            <input
              id="brushRadius"
              type="range"
              value="0.35"
              step="0.05"
              min="0.05"
              max="2.00"
              title="Points inside this radius are pushed"
            />

            <label class="slider-field" for="brushStrength">
              <span>Brush strength (m)</span>
              <span id="brushStrengthValue">0.16</span>
            </label>
            <input
              id="brushStrength"
              type="range"
              value="0.16"
              step="0.01"
              min="0.01"
              max="1.00"
              title="Maximum push distance at brush center"
            />
          </div>

          <div id="cleanupControls" class="tool-settings">
            <label class="slider-field" for="cleanupThreshold">
              <span>Cleanup threshold (m)</span>
              <span id="cleanupThresholdValue">0.08</span>
            </label>
            <input
              id="cleanupThreshold"
              type="range"
              value="0.08"
              step="0.01"
              min="0.01"
              max="0.50"
              title="Points closer than this will be merged"
            />
          </div>
        </section>

        <section class="panel-card save-actions">
          <button
            id="saveMapJson"
            type="button"
            title="Save to /data/ros/map.json (fallback: browser download)"
          >
            Save map.json
          </button>
          <button
            id="saveMapJsonRestart"
            class="btn-warn"
            type="button"
            title="Save to /data/ros/map.json and restart open_mower_ros (fallback: browser download)"
          >
            Save + restart ROS
          </button>
        </section>

        <p class="hint panel-tip">
          Tip: Select a tool, then click/drag directly on the map.
        </p>

        <div id="status" class="status">Load a map to begin.</div>
      </aside>

      <main id="map"></main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
