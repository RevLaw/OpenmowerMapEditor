services:
  openmower-map-editor:
    build:
      context: .
    image: ghcr.io/revlaw/openmowermapeditor:latest
    container_name: openmower-map-editor
    ports:
      - "5080:80"
    volumes:
      - type: bind
        source: ./params
        target: /data/params
        read_only: true
      - type: bind
        source: ./ros
        target: /data/ros
