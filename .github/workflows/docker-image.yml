name: Build and push
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v5
    
    - name: Lowercase repo name
      run: |
        REPO_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/$REPO_NAME:latest" >> $GITHUB_ENV
        echo "IMAGE_NAME=$IMAGE_NAME"
        SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
        echo "IMAGE_SHA=ghcr.io/$REPO_NAME:sha-$SHORT_SHA" >> $GITHUB_ENV
        echo "IMAGE_SHA=$IMAGE_SHA"
        echo "PACKAGE_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
    
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/setup-qemu-action@v3

    - uses: docker/setup-buildx-action@v3
    
    - uses: docker/build-push-action@v7
      with:
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.IMAGE_NAME }}
          ${{ env.IMAGE_SHA }}

    # Official action: REST API for containers (no extra PAT). Uses GITHUB_TOKEN.
    # If this fails with 403, set the package's "Manage Actions access" to Admin for this repo.
    # Deletes at most 100 untagged versions per run (re-run workflow if needed).
    - uses: actions/delete-package-versions@v5
      with:
        package-name: ${{ env.PACKAGE_NAME }}
        package-type: container
        delete-only-untagged-versions: "true"
        min-versions-to-keep: 0
        token: ${{ github.token }}
