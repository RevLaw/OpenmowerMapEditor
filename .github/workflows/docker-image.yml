name: Build and push
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v5
    
    - name: Lowercase repo name
      run: |
        REPO_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/$REPO_NAME:latest" >> $GITHUB_ENV
        echo "IMAGE_NAME=$IMAGE_NAME"
        SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
        echo "IMAGE_SHA=ghcr.io/$REPO_NAME:sha-$SHORT_SHA" >> $GITHUB_ENV
        echo "IMAGE_SHA=$IMAGE_SHA"
        OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
        PKG_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
        echo "GHCR_CLEANUP_USER=$OWNER_LC" >> $GITHUB_ENV
        echo "GHCR_CLEANUP_PACKAGE=$PKG_LC" >> $GITHUB_ENV
    
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/setup-qemu-action@v3

    - uses: docker/setup-buildx-action@v3
    
    - uses: docker/build-push-action@v7
      with:
        push: true
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.IMAGE_NAME }}
          ${{ env.IMAGE_SHA }}

    # Requires repo secret GHCR_TOKEN (PAT: read:packages + delete:packages for GHCR).
    - uses: mitchfen/cleanup-untagged-container-images@v1
      with:
        username: ${{ env.GHCR_CLEANUP_USER }}
        container-name: ${{ env.GHCR_CLEANUP_PACKAGE }}
        token: ${{ secrets.GHCR_TOKEN }}
